name: AI Bug Fixer
on:
  issues:
    types: [opened]

jobs:
  handoff:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}  # <--- THIS IS THE FIX
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          
          echo "Processing Issue #$ISSUE_NUMBER"

          # Now gh knows which repo to talk to without needing a .git folder
          gh issue comment $ISSUE_NUMBER --body "🤖 AI Agent is now processing this bug. Stand by..."
          gh issue edit $ISSUE_NUMBER --add-label "approved"
