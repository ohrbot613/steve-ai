name: AI Bug Fixer
on:
  issues:
    types: [opened]

jobs:
  handoff:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # Required to post comments and change labels
    steps:
      - name: Process Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          
          echo "Processing Issue #$ISSUE_NUMBER"

          # 1. Add a comment to the issue
          gh issue comment $ISSUE_NUMBER --body "🤖 AI Agent is now processing this bug. Stand by..."

          # 2. Change the label to 'approved'
          # Note: This will fail if the label 'approved' doesn't exist yet in your repo
          gh issue edit $ISSUE_NUMBER --add-label "approved"
