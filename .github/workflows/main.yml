name: AI Bug Fixer
on:
  issues:
    types: [opened]

jobs:
  handoff:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Handoff to Cursor
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          
          # 1. Clean the text so it doesn't break the JSON command
          # We use 'jq' to safely encode the title and body
          CLEAN_TITLE=$(echo "${{ github.event.issue.title }}" | jq -aRs .)
          CLEAN_BODY=$(echo "${{ github.event.issue.body }}" | jq -aRs .)

          echo "Processing Issue #$ISSUE_NUM"

          # 2. Setup Labels (Created if missing)
          gh label create "handed-to-agent" --color "FEF2C0" --force || true
          gh label create "awaiting-approval" --color "BFDADC" --force || true

          # 3. Mark as Handed to Agent
          gh issue edit $ISSUE_NUM --add-label "handed-to-agent"
          gh issue comment $ISSUE_NUM --body "🚀 **Handoff:** Sending this to the Cursor Cloud Agent..."

          # 4. Call Cursor Cloud Agent API (2026 v0 Format)
          # Note: prompt is now an object containing 'text'
          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            -d "{
              \"prompt\": {
                \"text\": \"Fix this bug. Title: $CLEAN_TITLE. Context: $CLEAN_BODY\"
              },
              \"source\": {
                \"repository
