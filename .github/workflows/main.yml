name: Handoff to Agent
on:
  issues:
    types: [labeled]

jobs:
  send-to-ai:
    # This condition ensures the code runs ONLY when 'handed-to-agent' is the label added
    if: github.event.label.name == 'handed-to-agent'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Send Issue to Cursor
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"

          # 1. Immediate feedback in the issue
          gh issue comment $ISSUE_NUM --body "🤖 **Agent Triggered:** Sending issue data to Cursor..."

          # 2. Build the JSON for Cursor
          jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg repo "https://github.com/$GH_REPO" \
            '{
              prompt: { text: ("Fix this bug. Title: " + $title + " Context: " + $body) },
              source: { repository: $repo, ref: "main" },
              target: { autoCreatePr: true }
            }' > payload.json

          # 3. Call the Cursor API
          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -H "Authorization: Bearer $CURSOR_API_KEY" \
            -H "Content-Type: application/json" \
            --data @payload.json)

          # 4. Success/Fail handling
          if [[ $RESPONSE == *"\"id\":"* ]]; then
            AGENT_URL=$(echo $RESPONSE | jq -r '.target.url // "https://cursor.com/agents"')
            gh issue comment $ISSUE_NUM --body "✅ **Sent!** Cursor is now working on a fix. [View Progress]($AGENT_URL)"
            
            # Optional: Remove the label so the issue is clean
            gh issue edit $ISSUE_NUM --remove-label "handed-to-agent"
          else
            gh issue comment $ISSUE_NUM --body "❌ **Error:** Failed to send to Cursor API. Response: $RESPONSE"
            exit 1
          fi
