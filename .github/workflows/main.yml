name: AI Bug Fixer
on:
  issues:
    types: [labeled]  # Trigger when a label is added

jobs:
  handoff:
    # ONLY run if the label added is exactly "send to ai"
    if: github.event.label.name == 'send to ai'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Handoff to Cursor
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          RAW_TITLE: ${{ github.event.issue.title }}
          RAW_BODY: ${{ github.event.issue.body }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}

          # 1. Create the payload file using jq
          jq -n \
            --arg title "$RAW_TITLE" \
            --arg body "$RAW_BODY" \
            --arg repo "https://github.com/$GH_REPO" \
            '{
              prompt: {
                text: ("Fix this bug. Title: " + $title + " Context: " + $body)
              },
              source: {
                repository: $repo,
                ref: "main"
              },
              target: {
                autoCreatePr: true
              }
            }' > cursor_payload.json

          # 2. Setup Status Labels
          gh label create "handed-to-agent" --color "FEF2C0" --force || true
          gh label create "awaiting-approval" --color "BFDADC" --force || true

          # 3. Mark Progress and REMOVE the trigger label
          gh issue edit $ISSUE_NUM --add-label "handed-to-agent" --remove-label "send to ai"
          gh issue comment $ISSUE_NUM --body "🚀 **Handoff:** Label 'send to ai' detected. Sending to Cursor Cloud Agent..."

          # 4. Call Cursor API
          RESPONSE=$(curl -s -X POST https://api.cursor.com/v0/agents \
            -u "$CURSOR_API_KEY:" \
            -H "Content-Type: application/json" \
            --data @cursor_payload.json)

          # 5. Handle Final State
          if [[ $RESPONSE == *"\"id\":"* ]]; then
            AGENT_URL=$(echo $RESPONSE | jq -r '.target.url')
            gh issue edit $ISSUE_NUM --add-label "awaiting-approval" --remove-label "handed-to-agent"
            gh issue comment $ISSUE_NUM --body "✅ **Success:** Agent is working! 🔗 [View Work]($AGENT_URL)"
          else
            gh issue comment $ISSUE_NUM --body "❌ **Actual Error:** Cursor rejected the request. Response: $RESPONSE"
            exit 1
          fi
