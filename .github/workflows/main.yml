name: AI Bug Fixer
on:
  issues:
    types: [opened]

jobs:
  handoff:
    runs-on: ubuntu-latest
    permissions:
      issues: write   # Allows adding labels and comments
    steps:
      - name: Process Issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          
          echo "Processing Issue #$ISSUE_NUMBER"

          # 1. Ensure the 'approved' label exists (Color: Soft Green)
          # --force updates the color if the label already exists
          gh label create "approved" --color "C2E0C6" --description "AI validated" --force || true

          # 2. Add a comment to the issue
          gh issue comment $ISSUE_NUMBER --body "🤖 AI Agent is now processing this bug. Stand by..."

          # 3. Add 'approved' label and remove 'in-review' (if it exists)
          gh issue edit $ISSUE_NUMBER --add-label "approved" --remove-label "in-review"
